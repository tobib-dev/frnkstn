syntax = "proto3";

package users.v1;

option go_package = "github.com/tobib-dev/frnkstn/gen/proto/users/v1";

service UserService {
  rpc CreateUser(Guest) returns (User) {}
}

message Guest {
  string name = 1;
  string email = 2;
  string git_username = 3;
}

message User {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string git_username = 4;
}
